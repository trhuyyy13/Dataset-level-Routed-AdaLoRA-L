alg_name: "MALMEN"
model_name: "Qwen/Qwen2.5-Coder-3B"
model_class: Qwen2ForCausalLM
tokenizer_class: PreTrainedTokenizerFast
tokenizer_name: "Qwen/Qwen2.5-Coder-3B"
device: 0
# Model
inner_params:
- model.layers.30.mlp.down_proj
- model.layers.31.mlp.down_proj
- model.layers.32.mlp.down_proj
- model.layers.33.mlp.down_proj
- model.layers.34.mlp.down_proj
- model.layers.35.mlp.down_proj

archive: null

# Method
alg: MALMEN
dropout: 0.0
train_base: False
no_grad_layers: null

rank: 1920
n_blocks: 2
lr: 1e-6
meta_lr: 1e-5
loc_coef: 1
max_grad_norm: 1
token: ans

# Train
n_edits: 1
batch_size: 2
editor_batch_size: 1024
silent: False
# max_epochs: 1
max_iters: 1000
log_interval: 100
eval_log_interval: 100
final_eval: True
val_interval: 100
early_stop_patience: 100
early_stop_key: "ES_val"
eval_only: False
debug: False
save: False

val_batch_size: 1
val_steps: 100 # only for debug

model_parallel: false

# Output
results_dir: ./results
